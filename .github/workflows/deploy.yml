name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed for actions/deploy-pages and to enable Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Use `npm install` (not `npm ci`): it resolves platform-specific optional
      # native deps (rollup, sharp) gracefully and avoids the `npm ci` "Exit handler
      # never called!" bug that fires on sharp's many @img/* platform packages.
      # `--include=dev` forces devDependencies (vite, svelte) even under NODE_ENV=production.
      - run: npm install --include=dev --no-audit --no-fund
        env:
          NODE_ENV: development
      # Fail loudly (and early) if the toolchain didn't install, instead of the
      # opaque "vite: not found" from the build step.
      - name: Verify vite is installed
        run: |
          if [ -x node_modules/.bin/vite ]; then
            echo "vite $(node_modules/.bin/vite --version) installed"
          else
            echo "::error::vite is not in node_modules/.bin after npm ci --include=dev"
            ls node_modules/.bin | head -50
            exit 1
          fi
      - run: npm run build
      # `enablement: true` flips the repo's Pages source to "GitHub Actions" if it
      # isn't already, so a fresh push deploys without changing repo settings by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
