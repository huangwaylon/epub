name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed for actions/deploy-pages and to enable Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `--include=dev` forces devDependencies (vite, svelte, etc.) even if the
      # runner has NODE_ENV=production, which would otherwise omit them.
      - run: npm ci --include=dev
        env:
          NODE_ENV: development
      - run: npm run build
      # `enablement: true` flips the repo's Pages source to "GitHub Actions" if it
      # isn't already, so a fresh push deploys without changing repo settings by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
